<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Macro Calendar | 미국 거시경제 달력</title>
<style>
:root {
  --bg:#0c0f1a;--bg2:#141828;--bg3:#1c2238;--bg4:#242a42;
  --border:#2a3050;--border2:#353d5e;
  --txt:#e4e8f5;--txt2:#8a94b8;--txt3:#555f80;
  --blue:#4f8ef7;--blue2:rgba(79,142,247,.12);
  --green:#00d09c;--green2:rgba(0,208,156,.12);
  --red:#ff4d5e;--red2:rgba(255,77,94,.12);
  --gold:#f5a623;--gold2:rgba(245,166,35,.12);
  --purple:#a78bfa;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;}
.site-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.hdr-left{display:flex;align-items:center;gap:12px;}
.hdr-logo{width:38px;height:38px;background:linear-gradient(135deg,#4f8ef7,#a78bfa);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.hdr-title h1{font-size:17px;font-weight:700;}
.hdr-title p{font-size:11px;color:var(--txt3);margin-top:1px;}
.hdr-right{display:flex;gap:24px;}
.hdr-stat{text-align:right;}
.hdr-stat-label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;display:block;}
.hdr-stat-val{font-size:15px;font-weight:700;}
.hdr-stat-val.rate{color:var(--gold);}
.container{max-width:1360px;margin:0 auto;padding:24px 20px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px;}
.cal-nav{display:flex;align-items:center;gap:12px;}
.nav-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;}
.nav-btn:hover{background:var(--bg4);color:var(--txt);}
.cal-title{font-size:22px;font-weight:700;min-width:160px;text-align:center;}
.today-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--txt2);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;}
.today-btn:hover{background:var(--blue);border-color:var(--blue);color:#fff;}
.cal-filters{display:flex;gap:6px;flex-wrap:wrap;}
.filter-btn{padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--txt3);cursor:pointer;font-size:11px;font-weight:500;transition:all .15s;white-space:nowrap;}
.filter-btn:hover{color:var(--txt2);border-color:var(--border2);}
.filter-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.legend{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt3);}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.cal-grid{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.day-headers{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg3);border-bottom:1px solid var(--border);}
.day-hdr{padding:10px 8px;text-align:center;font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);}
.day-cell{min-height:108px;padding:7px 6px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);vertical-align:top;}
.day-cell:nth-child(7n){border-right:none;}
.day-cell.other-month{opacity:.25;pointer-events:none;}
.day-cell.today{background:rgba(79,142,247,.04);}
.day-cell.weekend .day-num{color:var(--txt3);}
.day-num{font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.today-circle{width:19px;height:19px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.event-chip{display:flex;align-items:center;gap:3px;padding:3px 6px;border-radius:4px;margin-bottom:2px;cursor:pointer;transition:all .15s;font-size:10.5px;font-weight:500;line-height:1.3;border:1px solid transparent;max-width:100%;overflow:hidden;}
.event-chip:hover{transform:translateX(2px);filter:brightness(1.15);}
.event-chip .imp{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.imp.high{background:var(--red);}
.imp.medium{background:var(--gold);}
.imp.low{background:var(--blue);}
.chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.chip-val{font-weight:700;white-space:nowrap;flex-shrink:0;font-size:10px;}
.chip-beat{background:var(--green2);border-color:rgba(0,208,156,.25);color:var(--green);}
.chip-miss{background:var(--red2);border-color:rgba(255,77,94,.25);color:var(--red);}
.chip-inline{background:rgba(100,110,145,.15);border-color:rgba(100,110,145,.25);color:var(--txt2);}
.chip-upcoming{background:var(--blue2);border-color:rgba(79,142,247,.25);color:var(--blue);}
.chip-fomc{background:var(--gold2);border-color:rgba(245,166,35,.3);color:var(--gold);}
.more-chip{font-size:10px;color:var(--txt3);cursor:pointer;padding:1px 3px;border-radius:3px;margin-top:1px;display:inline-block;}
.more-chip:hover{color:var(--txt2);background:var(--bg4);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(3px);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg3);border:1px solid var(--border);border-radius:16px;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;transform:translateY(16px) scale(.98);transition:transform .2s;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.overlay.open .modal{transform:translateY(0) scale(1);}
.modal::-webkit-scrollbar{width:4px;}
.modal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.modal-hdr{padding:20px 22px 14px;border-bottom:1px solid var(--border);display:flex;gap:14px;align-items:flex-start;}
.modal-hdr-left{flex:1;}
.modal-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.modal-name{font-size:19px;font-weight:700;line-height:1.2;margin-bottom:4px;}
.modal-name-ko{font-size:12px;color:var(--txt2);}
.modal-close{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;transition:background .15s;}
.modal-close:hover{background:var(--bg4);}
.modal-body{padding:18px 22px;}
.stats-row{display:grid;gap:10px;margin-bottom:16px;}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.stat-box-label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
.stat-box-val{font-size:19px;font-weight:700;}
.stat-box-val.beat{color:var(--green);}
.stat-box-val.miss{color:var(--red);}
.stat-box-val.neutral{color:var(--txt);}
.stat-box-val.upcoming{color:var(--blue);}
.stat-box-val.fomc-val{color:var(--gold);}
.modal-desc{background:var(--bg2);border-radius:10px;padding:13px 15px;margin-bottom:16px;font-size:12px;color:var(--txt2);line-height:1.65;}
.modal-link{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:9px;border:1px solid var(--border);background:var(--bg2);color:var(--txt2);text-decoration:none;font-size:12px;font-weight:500;margin-bottom:18px;transition:all .15s;}
.modal-link:hover{border-color:var(--blue);color:var(--blue);background:var(--blue2);}
.vote-section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:15px 16px;}
.vote-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.vote-title{font-size:13px;font-weight:700;}
.vote-badge-closed{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(100,110,145,.15);color:var(--txt3);font-weight:600;}
.vote-sub{font-size:11px;color:var(--txt3);margin-bottom:14px;}
.vote-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.vote-btn{padding:10px 6px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--txt2);cursor:pointer;font-size:11px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .15s;}
.vote-btn:hover:not(:disabled){background:var(--bg4);}
.vote-btn:disabled{cursor:default;opacity:.6;}
.vote-btn .vico{font-size:17px;}
.vote-btn.active-high{background:var(--green2);border-color:var(--green);color:var(--green);}
.vote-btn.active-low{background:var(--red2);border-color:var(--red);color:var(--red);}
.vote-btn.active-inline{background:rgba(100,110,145,.2);border-color:var(--border2);color:var(--txt);}
.vr-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.vr-label{font-size:11px;font-weight:600;width:50px;flex-shrink:0;}
.vr-label.high{color:var(--green);}
.vr-label.low{color:var(--red);}
.vr-label.inline{color:var(--txt2);}
.vr-track{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.vr-fill{height:100%;border-radius:4px;transition:width .5s ease;}
.vr-fill.high{background:var(--green);}
.vr-fill.low{background:var(--red);}
.vr-fill.inline{background:var(--border2);}
.vr-pct{font-size:11px;font-weight:700;width:34px;text-align:right;flex-shrink:0;}
.vr-pct.high{color:var(--green);}
.vr-pct.low{color:var(--red);}
.vr-pct.inline{color:var(--txt2);}
.vr-total{font-size:10px;color:var(--txt3);text-align:right;margin-top:6px;}
.community-result{margin-top:10px;padding:8px 12px;border-radius:8px;font-size:11px;font-weight:600;text-align:center;}
.cr-right{background:var(--green2);color:var(--green);}
.cr-wrong{background:var(--red2);color:var(--red);}
.cat-fomc{color:var(--gold);}
.cat-employment{color:var(--green);}
.cat-inflation{color:var(--red);}
.cat-growth{color:var(--blue);}
.cat-housing{color:var(--purple);}
.cat-consumer{color:#f472b6;}
.cat-manufacturing{color:#38bdf8;}
.cat-trade{color:#34d399;}
html{scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
@media(max-width:768px){.container{padding:12px;}.day-cell{min-height:72px;padding:4px 3px;}.event-chip{font-size:9.5px;padding:2px 4px;}.hdr-right{display:none;}.cal-filters{display:none;}.cal-title{font-size:18px;}}
</style>
</head>
<body>
<header class="site-header">
  <div class="hdr-left">
    <div class="hdr-logo">📊</div>
    <div class="hdr-title">
      <h1>US Macro Calendar</h1>
      <p>미국 거시경제 지표 &amp; FOMC 달력 · FRED 실시간 · 한국 시간(KST) 기준</p>
    </div>
  </div>
  <div class="hdr-right">
    <div class="hdr-stat">
      <span class="hdr-stat-label">연방기금금리</span>
      <span class="hdr-stat-val rate" id="ffrDisplay">–</span>
    </div>
    <div class="hdr-stat">
      <span class="hdr-stat-label">다음 FOMC</span>
      <span class="hdr-stat-val" id="nextFomcDisplay">–</span>
    </div>
  </div>
</header>
<main class="container">
  <div class="cal-header">
    <div class="cal-nav">
      <button class="nav-btn" id="prevBtn">&#8249;</button>
      <div class="cal-title" id="calTitle"></div>
      <button class="nav-btn" id="nextBtn">&#8250;</button>
      <button class="today-btn" id="todayBtn">오늘</button>
    </div>
    <div class="cal-filters" id="filterBar"></div>
  </div>
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>이전값 상회</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>이전값 하회</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--border2)"></div>부합</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--blue)"></div>발표 예정</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--gold)"></div>FOMC</div>
    <div class="leg-item"><div class="imp high" style="display:inline-block;width:8px;height:8px;border-radius:50%"></div>중요도 높음</div>
    <div class="leg-item"><div class="imp medium" style="display:inline-block;width:8px;height:8px;border-radius:50%"></div>중요도 중간</div>
    <div class="leg-item" style="margin-left:auto;"><span id="fredStatus" style="font-size:11px;color:var(--txt3);"></span></div>
  </div>
  <div class="cal-grid">
    <div class="day-headers" id="dayHeaders"></div>
    <div class="cal-body" id="calBody"></div>
  </div>
</main>
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal"></div>
</div>
<script>
/* ============================================================
   CONFIG
============================================================ */
const FRED_KEY = 'eabdbbc9f6d3d4300c5ad940b27a1a16';

// FRED series → { calculation type, good direction, display formatter }
const FC = {
  'PAYEMS:mom_change':      {dir:'high', fmt:v=>`${v>0?'+':''}${Math.round(v)}K`},
  'UNRATE:direct':          {dir:'low',  fmt:v=>`${parseFloat(v).toFixed(1)}%`},
  'CES0500000003:mom_pct':  {dir:'high', fmt:v=>`${v>=0?'+':''}${v.toFixed(1)}%`},
  'CPIAUCSL:yoy_pct':       {dir:'low',  fmt:v=>`${v.toFixed(1)}%`},
  'CPIAUCSL:mom_pct':       {dir:'low',  fmt:v=>`${v>=0?'+':''}${v.toFixed(2)}%`},
  'CPILFESL:mom_pct':       {dir:'low',  fmt:v=>`${v>=0?'+':''}${v.toFixed(2)}%`},
  'PCEPI:yoy_pct':          {dir:'low',  fmt:v=>`${v.toFixed(1)}%`},
  'PCEPILFE:yoy_pct':       {dir:'low',  fmt:v=>`${v.toFixed(1)}%`},
  'PPIFIS:mom_pct':         {dir:'low',  fmt:v=>`${v>=0?'+':''}${v.toFixed(2)}%`},
  'RSXFS:mom_pct':          {dir:'high', fmt:v=>`${v>=0?'+':''}${v.toFixed(1)}%`},
  'INDPRO:mom_pct':         {dir:'high', fmt:v=>`${v>=0?'+':''}${v.toFixed(1)}%`},
  'HOUST:direct':           {dir:'high', fmt:v=>`${(parseFloat(v)/1000).toFixed(2)}M`},
  'PERMIT:direct':          {dir:'high', fmt:v=>`${(parseFloat(v)/1000).toFixed(2)}M`},
  'JTSJOL:direct':          {dir:'high', fmt:v=>`${(parseFloat(v)/1000).toFixed(2)}M`},
  'ICSA:direct':            {dir:'low',  fmt:v=>`${Math.round(parseFloat(v)/1000)}K`},
  'UMCSENT:direct':         {dir:'high', fmt:v=>`${parseFloat(v).toFixed(1)}`},
  'A191RL1Q225SBEA:direct': {dir:'high', fmt:v=>`${parseFloat(v)>=0?'+':''}${parseFloat(v).toFixed(1)}%`},
  'PI:mom_pct':             {dir:'high', fmt:v=>`${v>=0?'+':''}${v.toFixed(1)}%`},
  'PCE:mom_pct':            {dir:'high', fmt:v=>`${v>=0?'+':''}${v.toFixed(1)}%`},
  'DGORDER:mom_pct':        {dir:'high', fmt:v=>`${v>=0?'+':''}${v.toFixed(1)}%`},
  'EXHOSLUSM495S:direct':   {dir:'high', fmt:v=>`${parseFloat(v).toFixed(2)}M`},
  'HSN1F:direct':           {dir:'high', fmt:v=>`${Math.round(parseFloat(v))}K`},
  'DFEDTARU:direct':        {dir:'low',  fmt:v=>`${parseFloat(v).toFixed(2)}%`},
};

/* ============================================================
   FOMC SCHEDULE (hardcoded — updated annually by Fed)
============================================================ */
const FOMC_SCHEDULE = [
  {y:2026,m:0, day1:'2026-01-27',dec:'2026-01-28',presser:true},
  {y:2026,m:2, day1:'2026-03-17',dec:'2026-03-18',presser:true},
  {y:2026,m:3, day1:'2026-04-28',dec:'2026-04-29',presser:true},
  {y:2026,m:5, day1:'2026-06-16',dec:'2026-06-17',presser:true},
  {y:2026,m:6, day1:'2026-07-28',dec:'2026-07-29',presser:false},
  {y:2026,m:8, day1:'2026-09-15',dec:'2026-09-16',presser:true},
  {y:2026,m:9, day1:'2026-10-27',dec:'2026-10-28',presser:false},
  {y:2026,m:11,day1:'2026-12-08',dec:'2026-12-09',presser:true},
  {y:2027,m:0, day1:'2027-01-26',dec:'2027-01-27',presser:true},
  {y:2027,m:2, day1:'2027-03-16',dec:'2027-03-17',presser:true},
  {y:2027,m:3, day1:'2027-04-27',dec:'2027-04-28',presser:true},
  {y:2027,m:5, day1:'2027-06-15',dec:'2027-06-16',presser:true},
  {y:2027,m:6, day1:'2027-07-27',dec:'2027-07-28',presser:false},
  {y:2027,m:8, day1:'2027-09-14',dec:'2027-09-15',presser:true},
  {y:2027,m:9, day1:'2027-10-26',dec:'2027-10-27',presser:false},
  {y:2027,m:11,day1:'2027-12-07',dec:'2027-12-08',presser:true},
];

/* ============================================================
   DATE HELPERS
============================================================ */
function toDS(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function toYM(y,m){return `${y}-${String(m+1).padStart(2,'0')}`;}
function firstWD(y,m,wd){let d=new Date(y,m,1);while(d.getDay()!==wd)d.setDate(d.getDate()+1);return d;}
function nthWD(y,m,wd,n){let d=firstWD(y,m,wd);d.setDate(d.getDate()+(n-1)*7);return d;}
function lastWD(y,m,wd){let d=new Date(y,m+1,0);while(d.getDay()!==wd)d.setDate(d.getDate()-1);return d;}
function allWD(y,m,wd){let r=[],d=firstWD(y,m,wd);while(d.getMonth()===m){r.push(new Date(d));d.setDate(d.getDate()+7);}return r;}
function firstBD(y,m){let d=new Date(y,m,1);while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()+1);return d;}
function nthBD(y,m,n){let d=new Date(y,m,1),c=0;while(true){if(d.getDay()!==0&&d.getDay()!==6){c++;if(c===n)return d;}d.setDate(d.getDate()+1);}}
function offM(y,m,o){let nm=m+o,ny=y;while(nm<0){nm+=12;ny--;}while(nm>11){nm-=12;ny++;}return{y:ny,m:nm};}

/* ============================================================
   KST (한국 표준시, UTC+9) 변환
   EDT(UTC-4)→KST: +13h / EST(UTC-5)→KST: +14h
   US DST: 3월 둘째 일요일 ~ 11월 첫째 일요일
============================================================ */
function isUSEDT(dateStr){
  const d=new Date(dateStr+'T12:00:00'),y=d.getFullYear();
  return d>=nthWD(y,2,0,2)&&d<nthWD(y,10,0,1);
}
function etToKST(dateStr,timeStr){
  if(!timeStr||timeStr==='–')return{date:dateStr,time:'–'};
  const [h,m]=timeStr.split(':').map(Number);
  const off=isUSEDT(dateStr)?13:14;
  const tot=h*60+m+off*60;
  const kstH=Math.floor(tot/60)%24,kstM=tot%60;
  const kstTime=`${String(kstH).padStart(2,'0')}:${String(kstM).padStart(2,'0')}`;
  const dayOff=Math.floor(tot/(24*60));
  let kstDate=dateStr;
  if(dayOff>0){const nd=new Date(dateStr+'T12:00:00');nd.setDate(nd.getDate()+dayOff);kstDate=toDS(nd);}
  return{date:kstDate,time:kstTime};
}

/* ============================================================
   DESCRIPTIONS & LINKS
============================================================ */
const DESCS={

/* ============================================================

============================================================ */
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i);h|=0;}return Math.abs(h);}
function seededRng(seed){let x=seed;return()=>{x=(x*1664525+1013904223)&0xffffffff;return(x>>>0)/0xffffffff;};}
function genVotes(){
  return{high:0,inline:0,low:0};
}

/* ============================================================
   EVENT FACTORY
============================================================ */
const TODAY=new Date();
function makeEv(id,date,time,name,nameKo,cat,imp,linkKey,series,calc,ref){
  const kst=etToKST(date,time);
  const released=kst.date&&new Date(kst.date+'T23:59:59')<=TODAY;
  return{
    id,date:kst.date,time:kst.time,name,nameKo,category:cat,importance:imp,
    actual:null,previous:null,
    released,beat:released?'inline':null,
    link:LINKS[linkKey]||LINKS['fomc']||'#',
    desc:DESCS[name]||'–',
    votes:genVotes(id,imp),
    _series:series,_calc:calc,_ref:ref
  };
}

/* ============================================================
   AUTO-GENERATE MONTH EVENTS
============================================================ */
function generateMonthEvents(year,month){
  const evs=[];
  const ym=toYM(year,month);
  const pm=offM(year,month,-1), pp=offM(year,month,-2);
  const pym=toYM(pm.y,pm.m), ppym=toYM(pp.y,pp.m);

  function add(slug,date,time,name,nameKo,cat,imp,linkKey,series,calc,ref){
    // Avoid adding events that fall outside this month
    if(date.getMonth()!==month||date.getFullYear()!==year)return;
    evs.push(makeEv(`${slug}-${ym}`,toDS(date),time,name,nameKo,cat,imp,linkKey,series,calc,ref));
  }

  // ── Week 1 ──────────────────────────────────────────────
  // ISM Manufacturing: 1st business day
  add('ism-mfg',firstBD(year,month),'10:00','ISM Manufacturing PMI','ISM 제조업 PMI','manufacturing','medium','ism-mfg',null,null,null);

  // JOLTS: 1st Tuesday (data from 2 months ago)
  add('jolts',nthWD(year,month,2,1),'10:00','JOLTS Job Openings','JOLTS 구인건수','employment','high','jolts','JTSJOL','direct',ppym);

  // Trade Balance: 1st Thursday
  add('trade',nthWD(year,month,4,1),'08:30','Trade Balance','무역수지','trade','medium','trade',null,null,null);

  // NFP week: First Friday
  const nfpDate=nthWD(year,month,5,1);
  // ADP: Wednesday before NFP
  const adpDate=new Date(nfpDate); adpDate.setDate(adpDate.getDate()-2);
  add('adp',adpDate,'08:15','ADP Nonfarm Employment','ADP 비농업 고용','employment','medium','adp',null,null,null);
  // ISM Services: 3rd business day (falls in NFP week)
  add('ism-svc',nthBD(year,month,3),'10:00','ISM Services PMI','ISM 서비스 PMI','manufacturing','high','ism-svc',null,null,null);
  add('nfp',nfpDate,'08:30','Nonfarm Payrolls','비농업 고용자수','employment','high','nfp','PAYEMS','mom_change',pym);
  add('unemp',nfpDate,'08:30','Unemployment Rate','실업률','employment','high','unemp','UNRATE','direct',pym);
  add('ahe',nfpDate,'08:30','Avg Hourly Earnings MoM','평균 시간당 임금 (전월 대비)','employment','medium','ahe','CES0500000003','mom_pct',pym);

  // ── Week 2 ──────────────────────────────────────────────
  // CPI: 2nd Wednesday
  const cpiDate=nthWD(year,month,3,2);
  add('cpi',cpiDate,'08:30','CPI YoY','소비자물가지수 (전년 대비)','inflation','high','cpi','CPIAUCSL','yoy_pct',pym);
  add('core-cpi',cpiDate,'08:30','Core CPI MoM','근원 CPI (전월 대비)','inflation','high','core-cpi','CPILFESL','mom_pct',pym);
  // PPI: Thursday after CPI
  const ppiDate=new Date(cpiDate); ppiDate.setDate(ppiDate.getDate()+1);
  add('ppi',ppiDate,'08:30','PPI MoM','생산자물가지수 (전월 대비)','inflation','high','ppi','PPIFIS','mom_pct',pym);
  // Michigan Prelim: 2nd Friday
  add('mich-prelim',nthWD(year,month,5,2),'10:00','Michigan Consumer Sentiment (Prelim)','미시간 소비자심리지수 (예비)','consumer','medium','mich','UMCSENT','direct',ym);
  // Consumer Credit: 2nd Monday
  add('credit',nthWD(year,month,1,2),'15:00','Consumer Credit MoM','소비자 신용 (전월 대비)','consumer','low','credit',null,null,null);

  // ── Week 3 ──────────────────────────────────────────────
  // Empire State: 3rd Monday
  add('empire',nthWD(year,month,1,3),'08:30','NY Empire State Mfg','뉴욕 엠파이어스테이트 제조업','manufacturing','medium','empire',null,null,null);
  // Retail Sales: 3rd Wednesday
  add('retail',nthWD(year,month,3,3),'08:30','Retail Sales MoM','소매판매 (전월 대비)','consumer','high','retail','RSXFS','mom_pct',pym);
  // Industrial Production & Philly Fed: 3rd Thursday
  const thu3=nthWD(year,month,4,3);
  add('indprod',thu3,'09:15','Industrial Production MoM','산업생산 (전월 대비)','manufacturing','medium','indprod','INDPRO','mom_pct',pym);
  add('philly',thu3,'08:30','Philadelphia Fed Mfg','필라델피아 연준 제조업','manufacturing','medium','philly',null,null,null);
  // Housing Starts & Permits: 3rd Friday
  const fri3=nthWD(year,month,5,3);
  add('housing',fri3,'08:30','Housing Starts','주택착공','housing','medium','housing','HOUST','direct',pym);
  add('permits',fri3,'08:30','Building Permits','건축허가','housing','medium','permits','PERMIT','direct',pym);

  // ── Week 4 ──────────────────────────────────────────────
  // New Home Sales: 4th Wednesday
  add('new-homes',nthWD(year,month,3,4),'10:00','New Home Sales','신규주택판매','housing','medium','new-homes','HSN1F','direct',pym);
  // Existing Home Sales & Durable Goods: 4th Thursday
  const thu4=nthWD(year,month,4,4);
  add('exist-homes',thu4,'10:00','Existing Home Sales','기존주택판매','housing','medium','exist-homes','EXHOSLUSM495S','direct',pym);
  add('durable',thu4,'08:30','Durable Goods Orders MoM','내구재 주문 (전월 대비)','manufacturing','medium','durable','DGORDER','mom_pct',pym);
  // Pending Home Sales: 4th Monday
  add('pending',nthWD(year,month,1,4),'10:00','Pending Home Sales MoM','주택판매보류 (전월 대비)','housing','low','pending',null,null,null);

  // ── Last Week ────────────────────────────────────────────
  // Consumer Confidence: Last Tuesday
  add('conf-board',lastWD(year,month,2),'10:00','Consumer Confidence','소비자신뢰지수','consumer','medium','conf-board',null,null,null);
  // PCE / Personal Income & Spending / Michigan Final: Last Friday
  const lastFri=lastWD(year,month,5);
  add('pce',lastFri,'08:30','PCE Price Index YoY','PCE 물가지수 (전년 대비)','inflation','high','pce','PCEPI','yoy_pct',pym);
  add('core-pce',lastFri,'08:30','Core PCE YoY','근원 PCE (전년 대비)','inflation','high','core-pce','PCEPILFE','yoy_pct',pym);
  add('pers-income',lastFri,'08:30','Personal Income MoM','개인소득 (전월 대비)','consumer','medium','pers-income','PI','mom_pct',pym);
  add('pers-spend',lastFri,'08:30','Personal Spending MoM','개인소비 (전월 대비)','consumer','high','pers-spend','PCE','mom_pct',pym);
  add('mich-final',lastFri,'10:00','Michigan Consumer Sentiment (Final)','미시간 소비자심리지수 (확정)','consumer','medium','mich','UMCSENT','direct',ym);

  // ── GDP: Quarterly advance (Jan, Apr, Jul, Oct) ──────────
  if([0,3,6,9].includes(month)){
    const qMap={0:'Q4',3:'Q1',6:'Q2',9:'Q3'};
    const qRefM={0:9,3:0,6:3,9:6};
    const qRefY={0:year-1,3:year,6:year,9:year};
    const lastThu=lastWD(year,month,4);
    if(lastThu.getMonth()===month){
      evs.push(makeEv(
        `gdp-${ym}`,toDS(lastThu),'08:30',
        `GDP QoQ Advance (${qMap[month]} ${qRefY[month]})`,
        `GDP 속보치 (${qRefY[month]} ${qMap[month]})`,
        'growth','high','gdp','A191RL1Q225SBEA','direct',toYM(qRefY[month],qRefM[month])
      ));
    }
  }

  // ── Initial Jobless Claims: Every Thursday ───────────────
  allWD(year,month,4).forEach((d,i)=>{
    evs.push(makeEv(
      `claims-${ym}-${i+1}`,toDS(d),'08:30',
      'Initial Jobless Claims','신규 실업수당 청구건수',
      'employment','medium','claims','ICSA','direct_weekly',null
    ));
  });

  // ── FOMC Events ──────────────────────────────────────────
  FOMC_SCHEDULE.forEach(f=>{
    // Beige Book: ~2 weeks before decision, nearest Wednesday
    const decD=new Date(f.dec+'T12:00:00');
    const beigeD=new Date(decD); beigeD.setDate(beigeD.getDate()-14);
    const bwd=beigeD.getDay();
    if(bwd!==3){beigeD.setDate(beigeD.getDate()+(bwd<3?3-bwd:10-bwd));}
    if(beigeD.getMonth()===month&&beigeD.getFullYear()===year){
      evs.push(makeEv(`beige-${f.y}${f.m}`,toDS(beigeD),'14:00','Fed Beige Book','연준 베이지북','fomc','medium','beige',null,null,null));
    }
    // FOMC Day 1
    const d1=new Date(f.day1+'T12:00:00');
    if(d1.getMonth()===month&&d1.getFullYear()===year){
      evs.push(makeEv(`fomc-day1-${f.y}${f.m}`,f.day1,'–','FOMC Meeting Day 1','FOMC 정례회의 1일차','fomc','high','fomc',null,null,null));
    }
    // FOMC Decision
    if(decD.getMonth()===month&&decD.getFullYear()===year){
      evs.push(makeEv(`fomc-dec-${f.y}${f.m}`,f.dec,'14:00','FOMC Rate Decision','FOMC 금리 결정','fomc','high','fomc','DFEDTARU','direct',null));
      if(f.presser)evs.push(makeEv(`fomc-pc-${f.y}${f.m}`,f.dec,'14:30','Fed Chair Press Conference','연준 의장 기자회견','fomc','high','fomc',null,null,null));
    }
  });

  return evs;
}

/* ============================================================
   VOTE HELPERS
============================================================ */
function getUserVote(id){return localStorage.getItem('uv_'+id);}
function getVoteCounts(ev){const s=localStorage.getItem('vc_'+ev.id);return s?JSON.parse(s):{...ev.votes};}
function saveVote(ev,choice){
  if(getUserVote(ev.id))return;
  localStorage.setItem('uv_'+ev.id,choice);
  const c=getVoteCounts(ev); c[choice]++;
  localStorage.setItem('vc_'+ev.id,JSON.stringify(c));
}

    `<button class="filter-btn ${activeFilter===f.id?'active':''}" onclick="setFilter('${f.id}')">${f.label}</button>`
  ).join('');
}
function setFilter(f){activeFilter=f;renderFilters();renderCalendar();}

function renderCalendar(){
  document.getElementById('calTitle').textContent=`${viewYear}년 ${MONTHS_KO[viewMonth]}`;
  document.getElementById('dayHeaders').innerHTML=DAYS_KO.map((d,i)=>`<div class="day-hdr ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');

  const firstDay=new Date(viewYear,viewMonth,1).getDay();
  const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
  const daysInPrev=new Date(viewYear,viewMonth,0).getDate();
  let cells=[];
  for(let i=firstDay-1;i>=0;i--)cells.push({d:new Date(viewYear,viewMonth-1,daysInPrev-i),other:true});
  for(let d=1;d<=daysInMonth;d++)cells.push({d:new Date(viewYear,viewMonth,d),other:false});
  while(cells.length<42)cells.push({d:new Date(viewYear,viewMonth+1,cells.length-firstDay-daysInMonth+1),other:true});
  document.getElementById('calBody').innerHTML=cells.map(c=>renderDayCell(c)).join('');

  // Update next FOMC display
  const now=new Date();
  const next=FOMC_SCHEDULE.find(f=>{const k=etToKST(f.dec,'14:00');return new Date(k.date+'T'+k.time+':00')>=now;});
  if(next){const k=etToKST(next.dec,'14:00');document.getElementById('nextFomcDisplay').textContent=k.date.slice(5).replace('-','.');}
}

function eventsForDate(d){
  const ds=toDS(d);
  return EVENTS.filter(e=>e.date===ds&&(activeFilter==='all'||e.category===activeFilter));
}

function chipClass(ev){
  if(ev.category==='fomc')return 'chip-fomc';
  if(!ev.released)return 'chip-upcoming';
  if(ev.beat==='beat')return 'chip-beat';
  if(ev.beat==='miss')return 'chip-miss';
  return 'chip-inline';
}

function renderDayCell({d,other}){
  const today=d.getFullYear()===TODAY.getFullYear()&&d.getMonth()===TODAY.getMonth()&&d.getDate()===TODAY.getDate();
  const weekend=d.getDay()===0||d.getDay()===6;
  const cls=['day-cell',other?'other-month':'',today?'today':'',weekend?'weekend':''].filter(Boolean).join(' ');
  const evs=eventsForDate(d), MAX=3;
  const shown=evs.slice(0,MAX), extra=evs.length-MAX;
  const dayNum=today?`<div class="day-num"><div class="today-circle">${d.getDate()}</div></div>`:`<div class="day-num">${d.getDate()}</div>`;
  const chips=shown.map(ev=>`
    <div class="event-chip ${chipClass(ev)}" onclick="openModal('${ev.id}')">
      <span class="imp ${ev.importance}"></span>
      <span class="chip-name">${ev.name.split(' ').slice(0,3).join(' ')}</span>
      ${ev.released&&ev.actual?`<span class="chip-val">${ev.actual}</span>`:''}
    </div>`).join('');
  const more=extra>0?`<span class="more-chip" onclick="showAllDay('${toDS(d)}')">+${extra}개 더</span>`:'';
  return `<div class="${cls}">${dayNum}${chips}${more}</div>`;
}

function openModal(id){
  const ev=EVENTS.find(e=>e.id===id); if(!ev)return;
  activeEvent=ev; renderModal(ev);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';activeEvent=null;}
function handleOverlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}

function renderModal(ev){

  const uv=getUserVote(ev.id), vc=getVoteCounts(ev);
  const total=vc.high+vc.inline+vc.low;
  const pH=total>0?Math.round(vc.high/total*100):0;
  const pI=total>0?Math.round(vc.inline/total*100):0;
  const pL=total>0?Math.round(vc.low/total*100):0;

  // Stats

  if(ev.released&&ev.actual){

  }else if(ev.released){

      <div class="stat-box"><div class="stat-box-label">실제값</div><div class="stat-box-val upcoming" style="font-size:12px;">FRED 업데이트 대기</div></div>
      <div class="stat-box"><div class="stat-box-label">이전값</div><div class="stat-box-val neutral">${ev.previous||'–'}</div></div>
    </div>`;

      <div class="vote-sub">${votingClosed?'발표 전 커뮤니티 예측 결과입니다.':uv?'이미 투표하셨습니다.':'이전값 대비 이번 수치가 어떻게 나올지 예측해보세요!'}</div>
      ${!votingClosed?`<div class="vote-btns">
        <button class="vote-btn ${uv==='high'?'active-high':''}" onclick="castVote('high')" ${canVote?'':'disabled'}>

        </button>
        <button class="vote-btn ${uv==='inline'?'active-inline':''}" onclick="castVote('inline')" ${canVote?'':'disabled'}>
          <span class="vico">➡️</span><span>비슷</span><span style="font-size:9px;opacity:.7">이전값 유사</span>
        </button>
        <button class="vote-btn ${uv==='low'?'active-low':''}" onclick="castVote('low')" ${canVote?'':'disabled'}>
          <span class="vico">🔽</span><span>낮다</span><span style="font-size:9px;opacity:.7">이전값 하회</span>
        </button>
      </div>`:''}
      <div class="vr-row"><span class="vr-label high">높다</span><div class="vr-track"><div class="vr-fill high" style="width:${pH}%"></div></div><span class="vr-pct high">${pH}%</span></div>
      <div class="vr-row"><span class="vr-label inline">비슷</span><div class="vr-track"><div class="vr-fill inline" style="width:${pI}%"></div></div><span class="vr-pct inline">${pI}%</span></div>

  const impLabel=ev.importance==='high'?'🔴 중요도 높음':ev.importance==='medium'?'🟡 중요도 중간':'🔵 중요도 낮음';

  document.getElementById('modal').innerHTML=`

      </a>
      ${voteHtml}
    </div>`;
}

  if(!activeEvent||activeEvent.released||getUserVote(activeEvent.id))return;

/* ============================================================
   FRED API
============================================================ */
async function fredFetch(series,limit=15){
  if(fredCache[series])return fredCache[series];
  try{
    const r=await fetch(`https://api.stlouisfed.org/fred/series/observations?series_id=${series}&api_key=${FRED_KEY}&file_type=json&sort_order=desc&limit=${limit}`);
    if(!r.ok)return[];
    const d=await r.json();
    fredCache[series]=(d.observations||[]).filter(o=>o.value!='.');
    return fredCache[series];
  }catch(e){return[];}
}

function momPct(obs,ref){
  const s=[...obs].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const i=s.findIndex(o=>o.date.startsWith(ref));
  if(i<0||i>=s.length-1)return{val:null,prv:null};
  const val=(parseFloat(s[i].value)/parseFloat(s[i+1].value)-1)*100;
  const prv=i+2<s.length?(parseFloat(s[i+1].value)/parseFloat(s[i+2].value)-1)*100:null;
  return{val,prv};
}
function yoyPct(obs,ref){
  const cur=obs.find(o=>o.date.startsWith(ref)); if(!cur)return{val:null,prv:null};
  const d=new Date(ref+'-01'); d.setFullYear(d.getFullYear()-1);
  const p1=obs.find(o=>o.date.startsWith(d.toISOString().slice(0,7))); if(!p1)return{val:null,prv:null};
  const val=(parseFloat(cur.value)/parseFloat(p1.value)-1)*100;
  // prev month yoy
  const pd=new Date(ref+'-01'); pd.setMonth(pd.getMonth()-1);
  const pd2=new Date(pd); pd2.setFullYear(pd2.getFullYear()-1);
  const cur2=obs.find(o=>o.date.startsWith(pd.toISOString().slice(0,7)));
  const p2=obs.find(o=>o.date.startsWith(pd2.toISOString().slice(0,7)));
  const prv=cur2&&p2?(parseFloat(cur2.value)/parseFloat(p2.value)-1)*100:null;
  return{val,prv};
}
function momChange(obs,ref){
  const s=[...obs].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const i=s.findIndex(o=>o.date.startsWith(ref));
  if(i<0||i>=s.length-1)return{val:null,prv:null};
  const val=parseFloat(s[i].value)-parseFloat(s[i+1].value);
  const prv=i+2<s.length?parseFloat(s[i+1].value)-parseFloat(s[i+2].value):null;
  return{val,prv};
}
function beatDir(val,prv,dir){
  if(prv===null)return'inline';
  const diff=val-prv;
  if(Math.abs(diff)<Math.abs(prv)*0.003)return'inline';
  return(dir==='high'?diff>0:diff<0)?'beat':'miss';
}

async function initFREDData(){
  const el=document.getElementById('fredStatus');
  el.textContent='⟳ FRED 데이터 로딩 중...';

  const ffr=await fredFetch('DFEDTARU',2);
  if(ffr.length>0)document.getElementById('ffrDisplay').textContent=`${parseFloat(ffr[0].value).toFixed(2)}%`;

  // 발표된 것 + 예정된 것 모두 처리 (이전값을 위해)
  const allSeries=EVENTS.filter(ev=>ev._series&&ev._calc);
  if(!allSeries.length){el.textContent='';return;}

  const normalSeries=[...new Set(allSeries.filter(e=>e._calc!=='direct_weekly').map(e=>e._series))];
  await Promise.all(normalSeries.map(s=>fredFetch(s,15)));

  // 주간 실업수당 청구건수
  const claimsEvs=allSeries.filter(e=>e._calc==='direct_weekly');
  if(claimsEvs.length>0){
    const icsa=await fredFetch('ICSA',10);
    const sorted=[...icsa].sort((a,b)=>new Date(b.date)-new Date(a.date));
    claimsEvs.sort((a,b)=>new Date(b.date)-new Date(a.date));
    claimsEvs.forEach((ev,i)=>{
      if(i>=sorted.length)return;
      const cfg=FC['ICSA:direct'];
      if(ev.released){
        ev.actual=cfg.fmt(sorted[i].value);
        ev.beat=i+1<sorted.length?beatDir(parseFloat(sorted[i].value),parseFloat(sorted[i+1].value),cfg.dir):'inline';
      }
      if(i+1<sorted.length)try{ev.previous=cfg.fmt(sorted[i+1].value);}catch(e){}
    });
  }

  // 그 외 지표 처리
  for(const ev of allSeries.filter(e=>e._calc!=='direct_weekly')){
    const obs=fredCache[ev._series]||[];
    if(!obs.length)continue;
    const cfg=FC[`${ev._series}:${ev._calc}`]; if(!cfg)continue;

    let val=null, prv=null;
    try{
      // 발표된 이벤트: _ref 기준으로 실제값 계산
      if(ev.released&&ev._ref){
        if(ev._calc==='direct'){
          const o=obs.find(x=>x.date.startsWith(ev._ref));
          if(o){
            val=parseFloat(o.value);
            const s=[...obs].sort((a,b)=>new Date(b.date)-new Date(a.date));
            const i=s.findIndex(x=>x.date===o.date);
            if(i>=0&&i<s.length-1)prv=parseFloat(s[i+1].value);
          }
        }else if(ev._calc==='mom_pct'){const r=momPct(obs,ev._ref);val=r.val;prv=r.prv;}
        else if(ev._calc==='yoy_pct'){const r=yoyPct(obs,ev._ref);val=r.val;prv=r.prv;}
        else if(ev._calc==='mom_change'){const r=momChange(obs,ev._ref);val=r.val;prv=r.prv;}
      }else if(ev.released&&!ev._ref&&ev._calc==='direct'){
        // ref 없는 direct (예: FOMC 금리)
        const s=[...obs].sort((a,b)=>new Date(b.date)-new Date(a.date));
        if(s.length>0){val=parseFloat(s[0].value);if(s.length>1)prv=parseFloat(s[1].value);}
      }

      // prv가 없는 경우 (발표됐지만 FRED 미업데이트, 또는 발표 예정):
      // 가장 최신 FRED 데이터로 이전값 계산
      if(prv===null){
        const s=[...obs].sort((a,b)=>new Date(b.date)-new Date(a.date));
        if(ev._calc==='direct'&&s.length>0){
          prv=parseFloat(s[0].value);
        }else if(ev._calc==='mom_pct'&&s.length>=2){
          prv=(parseFloat(s[0].value)/parseFloat(s[1].value)-1)*100;
        }else if(ev._calc==='yoy_pct'&&s.length>0){
          const d=new Date(s[0].date);d.setFullYear(d.getFullYear()-1);
          const ya=obs.find(o=>o.date.startsWith(d.toISOString().slice(0,7)));
          if(ya)prv=(parseFloat(s[0].value)/parseFloat(ya.value)-1)*100;
        }else if(ev._calc==='mom_change'&&s.length>=2){
          prv=parseFloat(s[0].value)-parseFloat(s[1].value);
        }
      }
    }catch(e){continue;}

    if(ev.released&&val!==null&&!isNaN(val)){
      ev.actual=cfg.fmt(val);
      ev.beat=beatDir(val,prv,cfg.dir);
    }
    if(prv!==null&&!isNaN(prv))try{ev.previous=cfg.fmt(prv);}catch(e){}
  }

  el.textContent='✓ FRED 실시간';
  renderCalendar();
  if(activeEvent){const u=EVENTS.find(e=>e.id===activeEvent.id);if(u)renderModal(u);}
}

============================================================ */
document.getElementById('prevBtn').onclick=()=>{
  viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}
  regenerateEvents();renderCalendar();initFREDData();
};
document.getElementById('nextBtn').onclick=()=>{
  viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}
  regenerateEvents();renderCalendar();initFREDData();
};
document.getElementById('todayBtn').onclick=()=>{
  viewYear=TODAY.getFullYear();viewMonth=TODAY.getMonth();
  regenerateEvents();renderCalendar();initFREDData();
};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

regenerateEvents();
renderFilters();
renderCalendar();
initFREDData();
